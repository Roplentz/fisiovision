apiVersion: apps/v1
kind: Deployment
metadata:
  name: fisiovision-api
  labels: { app: fisiovision-api, environment: staging }
spec:
  replicas: 2
  selector:
    matchLabels: { app: fisiovision-api }
  template:
    metadata:
      labels: { app: fisiovision-api, environment: staging }
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: api
          image: ghcr.io/roplentz/fisiovision:staging
          imagePullPolicy: Always
          ports: [{ name: http, containerPort: 8080 }]
          env:
            - { name: NODE_ENV, value: production }
            - { name: FISIOVISION_RELEASES_FILE, value: /config/releases.json }
            - { name: FISIOVISION_REDIS_URL, valueFrom: { secretKeyRef: { name: fisiovision-staging, key: redis-url } } }
            - { name: FISIOVISION_JWT_ISSUER, valueFrom: { secretKeyRef: { name: fisiovision-staging, key: jwt-issuer } } }
            - { name: FISIOVISION_JWT_AUDIENCE, valueFrom: { secretKeyRef: { name: fisiovision-staging, key: jwt-audience } } }
            - { name: FISIOVISION_JWKS_URL, valueFrom: { secretKeyRef: { name: fisiovision-staging, key: jwks-url } } }
          volumeMounts:
            - { name: releases, mountPath: /config, readOnly: true }
          readinessProbe:
            httpGet: { path: /readyz, port: http }
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits: { cpu: 500m, memory: 256Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: [ALL] }
      volumes:
        - name: releases
          configMap: { name: fisiovision-releases }
