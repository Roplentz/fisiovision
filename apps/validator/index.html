<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="color-scheme" content="dark"><title>FisioVision Validator</title><link rel="stylesheet" href="./styles.css"></head><body>
<header><div><span>FISIOHUB</span><h1>Validação consolidada</h1></div><b>● processamento local</b></header>
<main><section class="drop"><h2>Pacotes de validação</h2><p>Importe os arquivos JSON gerados pelo Reviewer.</p><label>Selecionar pacotes<input id="files" type="file" accept=".json,application/json" multiple hidden></label><small id="status">Nenhum pacote importado</small></section>
<section id="dashboard" hidden><div class="cards"><article><span>Amostras</span><strong id="samples"></strong></article><article><span>Acurácia</span><strong id="accuracy"></strong></article><article><span>Sensibilidade</span><strong id="sensitivity"></strong></article><article><span>Especificidade</span><strong id="specificity"></strong></article><article><span>MAE</span><strong id="mae"></strong></article><article><span>Rejeição</span><strong id="rejection"></strong></article></div>
<div class="grid"><section><h2>Matriz de confusão</h2><table><thead><tr><th>Esperado / Automático</th><th>Aceito</th><th>Rejeitado</th></tr></thead><tbody id="matrix"></tbody></table></section><section><h2>Divergências</h2><div id="mismatches"></div></section></div>
<div class="actions"><button id="markdown">Baixar Markdown</button><button id="csv">Baixar CSV</button><button id="json">Baixar JSON</button></div></section><div id="errors" role="alert"></div></main><script type="module" src="./app.js"></script></body></html>
