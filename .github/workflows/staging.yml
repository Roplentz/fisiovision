name: Deploy staging
on:
  workflow_dispatch:
permissions:
  contents: read
  packages: write
concurrency:
  group: fisiovision-staging
  cancel-in-progress: false
jobs:
  deploy:
    environment: staging
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/roplentz/fisiovision:staging
      - name: Configure Kubernetes
        env:
          KUBECONFIG_BASE64: ${{ secrets.KUBECONFIG_BASE64 }}
        run: |
          echo "$KUBECONFIG_BASE64" | base64 -d > "$RUNNER_TEMP/kubeconfig"
          echo "KUBECONFIG=$RUNNER_TEMP/kubeconfig" >> "$GITHUB_ENV"
      - run: kubectl apply -k deploy/staging
      - run: kubectl rollout status deployment/fisiovision-api --timeout=180s
